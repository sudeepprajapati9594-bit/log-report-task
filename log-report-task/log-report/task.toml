artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Recover accurate traffic analytics from an HTTP access log containing retries, timezone variations, and escaped fields."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 1.0
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task contains silent correctness traps: duplicate request retries, timezone conversion requirements, and escaped fields. A naive parser produces plausible output but incorrect analytics."
solution_explanation = "Parse structured log entries, deduplicate request retries, normalize timestamps to UTC, calculate traffic statistics, and generate the required JSON report."
verification_explanation = "Validate the generated JSON report against expected analytics including request counts, unique clients, popular pages, UTC hourly aggregation, and error rate."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
